{# Balises SEO réutilisables — meta + canonical + JSON-LD #}
{% macro seo_head(seo, canonical=none, json_ld=none) %}
{% if seo %}
<meta name="description" content="{{ seo.description }}">
<meta name="robots" content="{{ seo.robots|default('index, follow') }}">
{% if seo.keywords %}<meta name="keywords" content="{{ seo.keywords }}">{% endif %}
<meta property="og:title" content="{{ seo.title }}">
<meta property="og:description" content="{{ seo.description }}">
<meta property="og:type" content="{{ seo.og_type|default('website') }}">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ seo.title }}">
<meta name="twitter:description" content="{{ seo.description }}">
{% if canonical %}<link rel="canonical" href="{{ canonical }}">{% endif %}
{% endif %}
{% if json_ld %}{{ json_ld|safe }}{% endif %}
{% endmacro %}
