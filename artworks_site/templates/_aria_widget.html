<div class="aria-root" id="aria-widget"
     data-api-url="{{ url_for('main.aria_chat') }}"
     data-site-url="{{ site_url }}">

  <button type="button" class="aria-fab" data-aria-fab aria-label="Ouvrir Aria, assistante Artworks">
    <span class="aria-fab-pulse" aria-hidden="true"></span>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" aria-hidden="true">
      <path d="M12 3c-4.4 0-8 3.1-8 7.5 0 2.4 1.2 4.5 3.1 5.9L6 21l3.6-1.8c.8.2 1.6.3 2.4.3 4.4 0 8-3.1 8-7.5S16.4 3 12 3z"/>
      <circle cx="9" cy="10.5" r="1" fill="currentColor" stroke="none"/>
      <circle cx="12" cy="10.5" r="1" fill="currentColor" stroke="none"/>
      <circle cx="15" cy="10.5" r="1" fill="currentColor" stroke="none"/>
    </svg>
  </button>

  <div class="aria-overlay" data-aria-overlay></div>

  <aside class="aria-panel" data-aria-panel role="dialog" aria-label="Aria — assistante Artworks" aria-modal="true">
    <header class="aria-head">
      <div class="aria-avatar" aria-hidden="true">A</div>
      <div class="aria-head-text">
        <h2>Aria</h2>
        <p>Assistante Artworks</p>
      </div>
      <div class="aria-head-actions">
        <button type="button" class="aria-icon-btn" data-aria-reset title="Nouvelle conversation" aria-label="Nouvelle conversation">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M3 12a9 9 0 1 0 3-6.7M3 3v6h6"/></svg>
        </button>
        <button type="button" class="aria-icon-btn" data-aria-close title="Fermer" aria-label="Fermer">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M6 6l12 12M18 6 6 18"/></svg>
        </button>
      </div>
    </header>

    <div class="aria-messages" data-aria-messages>
      <div class="aria-welcome" data-aria-welcome>
        <h3>Bonjour, je suis Aria</h3>
        <p>Votre guide Artworks — formules, achat d'œuvres, inscription artiste ou galerie, tout ce qui concerne la plateforme.</p>
        <div class="aria-suggestions">
          <button type="button" class="aria-suggestion" data-aria-suggestion="Qu'est-ce qu'Artworks et comment ça marche ?">Qu'est-ce qu'Artworks ?</button>
          <button type="button" class="aria-suggestion" data-aria-suggestion="Quelles sont les formules et tarifs pour un artiste ?">Formules artiste & tarifs</button>
          <button type="button" class="aria-suggestion" data-aria-suggestion="Comment acheter une œuvre sur la plateforme ?">Comment acheter une œuvre ?</button>
          <button type="button" class="aria-suggestion" data-aria-suggestion="Quelle commission sur les ventes ?">Commission sur les ventes</button>
        </div>
      </div>
    </div>

    <div class="aria-compose">
      <form data-aria-form>
        <div class="aria-compose-inner">
          <textarea data-aria-input rows="1" placeholder="Posez votre question sur Artworks…" maxlength="2000" aria-label="Votre message"></textarea>
          <button type="submit" class="aria-send" data-aria-send aria-label="Envoyer">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 19V5M5 12l7-7 7 7"/></svg>
          </button>
        </div>
      </form>
      <p class="aria-footnote">Aria répond uniquement sur Artworks</p>
    </div>
  </aside>
</div>
