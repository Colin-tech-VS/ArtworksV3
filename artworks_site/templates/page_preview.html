<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Aperçu — {{ artist.name }}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Outfit:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/site.css') }}">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/pubpage.css') }}">
  <style>
    body{ margin:0; background:var(--bg-pure,#faf9f7); }
    .preview-wrap{ padding:20px 16px 32px; max-width:1100px; margin:0 auto; }
    .preview-label{
      font-size:11px; font-weight:700; letter-spacing:.08em; text-transform:uppercase;
      color:var(--grey); margin:0 0 12px; text-align:center;
    }
    .preview-empty{ text-align:center; padding:80px 20px; color:var(--grey); font-size:.95rem; }
  </style>
</head>
<body>
  <div class="preview-wrap">
    <p class="preview-label">Aperçu en direct</p>
    {% if custom_page %}
    <section class="pubpage-sec" aria-label="Aperçu page personnalisée">
      {% include '_pubpage_canvas.html' %}
    </section>
    {% else %}
    <div class="preview-empty">Décrivez votre page à Aria pour voir l'aperçu ici.</div>
    {% endif %}
  </div>
</body>
</html>
